name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out tested revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: true
      - name: Audit Ruby dependencies
        run: |
          gem install bundler-audit --version 0.9.3 --no-document
          bundle-audit check --update
      - name: Build site
        run: bundle exec jekyll build --strict_front_matter

  publication-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tested revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _scripts/requirements*.txt
      - name: Install test dependencies
        run: python -m pip install --requirement _scripts/requirements-dev.txt
      - name: Run Python tests
        run: python -m pytest
      - name: Audit Python dependencies
        run: python -m pip_audit --local
      - name: Validate committed publication snapshot
        run: python _scripts/validate_publications_json.py
      - name: Check JavaScript syntax
        run: |
          node --check assets/js/graph_layout.js
          node --check assets/js/interface.js

  browser:
    name: Browser accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tested revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - name: Install browser test dependencies
        run: npm ci
      - name: Audit browser test dependencies
        run: npm audit --audit-level=moderate
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser accessibility tests
        run: npm run test:browser
      - name: Upload browser failure report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
